<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محسن ابراهیم‌زاده | فرزند ایران و جان‌فدای میهن</title>
<meta name="description" content="محسن ابراهیم‌زاده، ۳۷ ساله از تهران عزیز؛ فرزند ایران و جان‌فدای میهن.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F3F3F3;
  --text:#202020;
  --muted:#555;
  --walnut:#6E4B2A;
  --gold:#B08D57;
  --line:#DDD8CF;
  --card:#FFFFFF;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Vazirmatn',sans-serif;
}

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:56px 28px;
}

.memorial{
  width:100%;
  max-width:1180px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:64px;
  align-items:center;
}

.photo-wrap{
  background:var(--card);
  border:1px solid var(--line);
  padding:18px;
  border-radius:28px;
  box-shadow:0 18px 45px rgba(0,0,0,.08);
}

.photo-wrap img{
  width:100%;
  display:block;
  border-radius:18px;
}

.content{
  text-align:center;
}

.kicker{
  color:var(--gold);
  font-size:18px;
  font-weight:800;
  letter-spacing:.5px;
  margin-bottom:18px;
}

.title{
  font-size:46px;
  line-height:1.55;
  font-weight:900;
  color:var(--walnut);
  margin-bottom:28px;
}

.name{
  font-size:42px;
  font-weight:900;
  margin-bottom:18px;
}

.details{
  font-size:24px;
  line-height:2.1;
  color:var(--muted);
  font-weight:500;
}

.divider{
  width:160px;
  height:1px;
  background:var(--gold);
  margin:28px auto;
  opacity:.7;
}

.back{
  display:inline-block;
  margin-top:30px;
  color:var(--walnut);
  text-decoration:none;
  font-weight:800;
}

@media(max-width:850px){
  .page{
    padding:28px 18px;
    align-items:flex-start;
  }

  .memorial{
    grid-template-columns:1fr;
    gap:28px;
  }

  .photo-wrap{
    order:1;
  }

  .content{
    order:2;
  }

  .title{
    font-size:32px;
  }

  .name{
    font-size:30px;
  }

  .details{
    font-size:20px;
  }
}
</style>
</head>

<body>

<main class="page">
  <section class="memorial">

    <div class="content">
      <div class="kicker">جاویدنامان ایران عزیز</div>

      <div class="title">
        فرزند ایران<br>
        و جان‌فدای میهن
      </div>

      <div class="divider"></div>

      <div class="name">محسن ابراهیم‌زاده</div>

      <div class="details">
        ۳۷ ساله<br>
        ۱۹ دی ماه ۱۴۰۴ | تهران عزیز
      </div>

      <a class="back" href="../javidnaman.html">بازگشت به فهرست جاویدنامان</a>
    </div>

    <div class="photo-wrap">
      <img src="R240101.PNG" alt="محسن ابراهیم‌زاده">
    </div>

  </section>
</main>

</body>
</html>
