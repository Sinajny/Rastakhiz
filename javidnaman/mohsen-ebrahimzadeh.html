<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محسن ابراهیم‌زاده | فرزند ایران و جان‌فدای میهن</title>
<meta name="description" content="محسن ابراهیم‌زاده، ۳۷ ساله از تهران عزیز؛ فرزند ایران و جان‌فدای میهن.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F3F3F3;
  --text:#202020;
  --muted:#555;
  --walnut:#6E4B2A;
  --gold:#B08D57;
  --line:#B08D57;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Vazirmatn',sans-serif;
}

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:56px 28px;
}

.memorial{
  width:100%;
  max-width:1180px;
  display:grid;
  grid-template-columns:1fr 1px 1fr;
  gap:46px;
  align-items:center;
}

.photo img{
  width:100%;
  display:block;
  border-radius:0;
}

.vertical-line{
  width:1px;
  height:520px;
  background:linear-gradient(
    to bottom,
    transparent,
    var(--line),
    transparent
  );
  opacity:.85;
}

.content{
  text-align:center;
}

.title{
  font-size:48px;
  line-height:1.75;
  font-weight:900;
  color:var(--walnut);
  margin-bottom:28px;
}

.divider{
  width:160px;
  height:1px;
  background:var(--gold);
  margin:28px auto;
  opacity:.75;
}

.name{
  font-size:40px;
  font-weight:900;
  margin-bottom:18px;
}

.details{
  font-size:24px;
  line-height:2.1;
  color:var(--muted);
  font-weight:500;
}

.help-button{
  display:inline-block;
  margin-top:34px;
  padding:14px 24px;
  border:1px solid var(--walnut);
  border-radius:999px;
  color:var(--walnut);
  text-decoration:none;
  font-weight:800;
  background:transparent;
}

.help-button:hover{
  background:var(--walnut);
  color:white;
}

@media(max-width:850px){
  .page{
    padding:28px 18px;
    align-items:flex-start;
  }

  .memorial{
    grid-template-columns:1fr;
    gap:26px;
  }

  .photo{
    order:1;
  }

  .vertical-line{
    order:2;
    width:160px;
    height:1px;
    margin:auto;
    background:linear-gradient(
      to right,
      transparent,
      var(--line),
      transparent
    );
  }

  .content{
    order:3;
  }

  .title{
    font-size:32px;
  }

  .name{
    font-size:30px;
  }

  .details{
    font-size:20px;
  }
}
</style>
</head>

<body>

<main class="page">
  <section class="memorial">

    <div class="photo">
      <img src="R240101.PNG" alt="محسن ابراهیم‌زاده">
    </div>

    <div class="vertical-line"></div>

    <div class="content">

      <div class="title">
        فرزند ایران<br>
        و<br>
        جان‌فدای میهن
      </div>

      <div class="divider"></div>

      <div class="name">محسن ابراهیم‌زاده</div>

      <div class="details">
        ۳۷ ساله<br>
        ۱۹ دی ماه ۱۴۰۴ | تهران عزیز
      </div>

      <a class="help-button" href="#">
        به ما در تکمیل اطلاعات کمک کنید
      </a>

    </div>

  </section>
</main>

</body>
</html>
