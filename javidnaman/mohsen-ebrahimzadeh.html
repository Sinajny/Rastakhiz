<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محسن ابراهیم‌زاده | فرزند ایران و جان‌فدای میهن</title>
<meta name="description" content="صفحه یادبود محسن ابراهیم‌زاده، ۳۷ ساله از تهران عزیز؛ فرزند ایران و جان‌فدای میهن.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F3F3F3;
  --text:#202020;
  --muted:#666;
  --walnut:#6E4B2A;
  --gold:#B08D57;
  --card:#FFFFFF;
  --line:#DDD8CF;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Vazirmatn',sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  height:72px;
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(243,243,243,.92);
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter:blur(10px);
}

.logo{
  font-size:24px;
  font-weight:800;
  color:var(--walnut);
  text-decoration:none;
}

nav a{
  color:var(--walnut);
  text-decoration:none;
  font-weight:700;
  margin-right:16px;
}

main{
  max-width:1180px;
  margin:auto;
  padding:56px 24px;
}

.profile{
  display:grid;
  grid-template-columns:1fr 1.05fr;
  gap:42px;
  align-items:center;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:34px;
  padding:34px;
  box-shadow:0 18px 50px rgba(0,0,0,.06);
}

.image-box{
  border-radius:28px;
  overflow:hidden;
  background:#E7E2D9;
  min-height:520px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--line);
}

.image-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.content{
  text-align:right;
}

.label{
  color:var(--gold);
  font-size:34px;
  font-weight:900;
  line-height:1.7;
  margin-bottom:28px;
}

.name{
  font-size:56px;
  font-weight:900;
  color:var(--walnut);
  margin:0 0 18px;
  line-height:1.4;
}

.age{
  font-size:28px;
  font-weight:700;
  margin-bottom:18px;
}

.meta{
  font-size:24px;
  color:#333;
  margin-bottom:34px;
}

.divider{
  height:1px;
  background:var(--line);
  margin:28px 0;
}

.note{
  color:var(--muted);
  line-height:2.1;
  font-size:17px;
}

.back{
  display:inline-block;
  margin-top:30px;
  color:var(--walnut);
  font-weight:800;
  text-decoration:none;
}

footer{
  margin-top:56px;
  background:#E9E6DF;
  border-top:1px solid var(--line);
  padding:32px 24px;
  text-align:center;
  color:#555;
}

@media(max-width:850px){
  .profile{
    grid-template-columns:1fr;
    padding:22px;
  }

  .image-box{
    min-height:420px;
  }

  .label{
    font-size:26px;
  }

  .name{
    font-size:38px;
  }

  .age,.meta{
    font-size:20px;
  }
}
</style>
</head>

<body>

<header>
  <a class="logo" href="../index.html">رستاخیز</a>
  <nav>
    <a href="../index.html">خانه</a>
    <a href="../javidnaman.html">جاویدنامان</a>
  </nav>
</header>

<main>

  <section class="profile">

    <div class="image-box">
      <img src="R240101" alt="محسن ابراهیم‌زاده">
    </div>

    <div class="content">
      <div class="label">فرزند ایران و جان‌فدای میهن</div>

      <h1 class="name">محسن ابراهیم‌زاده</h1>

      <div class="age">۳۷ ساله</div>

      <div class="meta">۱۹ دی ماه ۱۴۰۴ | تهران عزیز</div>

      <div class="divider"></div>

      <p class="note">
        این صفحه برای ثبت نام، تصویر و یاد محسن ابراهیم‌زاده ساخته شده است.
        روایت کامل در مرحله بعد به این بخش افزوده خواهد شد.
      </p>

      <a class="back" href="../javidnaman.html">← بازگشت به فهرست جاویدنامان</a>
    </div>

  </section>

</main>

<footer>
  © Rastakhiz.ch | رستاخیز
</footer>

</body>
</html>
